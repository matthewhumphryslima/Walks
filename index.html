<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wednesday Walks With Matthew</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #1a1a1a; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px; 
            box-sizing: border-box; 
        }
        
        .main-title { 
            color: #ffffff; 
            font-size: 1.4rem; 
            margin: 10px 0 15px 0; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 900; 
        }

        .question-display { 
            width: 100%; 
            max-width: 600px; 
            background: #2a2a2a; 
            border: 5px solid #444; 
            border-radius: 15px; 
            padding: 30px 20px; 
            margin-bottom: 20px; 
            min-height: 180px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            text-align: center; 
            transition: border-color 0.3s;
        }

        #en { font-size: 1.4rem; margin-bottom: 15px; display: block; font-weight: 600; line-height: 1.3; }
        #es { font-size: 1.2rem; color: #aaa; display: block; font-style: italic; line-height: 1.3; }

        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            width: 100%; 
            max-width: 600px; 
        }
        
        button { 
            padding: 20px 5px; 
            font-size: 1.1rem; 
            font-weight: 800; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: transform 0.1s; 
        }

        .yellow { background-color: #ffeb3b; color: #000; }
        .blue { background-color: #2196f3; color: #fff; }
        .red { background-color: #f44336; color: #fff; }
        .green { background-color: #4caf50; color: #fff; }

        .rng-section { 
            margin-top: 25px; 
            padding-top: 15px; 
            border-top: 1px solid #333; 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
        }

        .rng-display { font-size: 3rem; font-weight: bold; color: #ffeb3b; height: 60px; margin-bottom: 5px; }
        .btn-rng { background-color: #444; color: white; width: auto; padding: 12px 25px; font-size: 0.9rem; border-radius: 10px; border: none; cursor: pointer; }
        
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1 class="main-title">Wednesday Walks With Matthew</h1>

    <div class="question-display" id="display">
        <span id="en">Ready for the walk? Tap a color!</span>
        <span id="es">¿Listo para la caminata? ¡Toca un color!</span>
    </div>

    <div class="controls">
        <button class="yellow" onclick="pick('yellow')">Yellow</button>
        <button class="blue" onclick="pick('blue')">Blue</button>
        <button class="red" onclick="pick('red')">Red</button>
        <button class="green" onclick="pick('green')">Green</button>
    </div>

    <div class="rng-section">
        <div class="rng-display" id="number-out">-</div>
        <button class="btn-rng" onclick="generateNumber()">Get Random Number (1-100)</button>
    </div>

    <script>
        const questions = {
            yellow: [
                { en: "What is your favorite district in Lima and why?", es: "¿Cuál es tu distrito favorito en Lima y por qué?" },
                { en: "What is the best dish you've eaten this week?", es: "¿Cuál es el mejor plato que has comido esta semana?" },
                { en: "How long have you lived in Peru and what brought you here?", es: "¿Cuánto tiempo llevas en Perú y qué te trajo por aquí?" },
                { en: "What is your favorite place to take a walk in the city?", es: "¿Cuál es tu lugar favorito para caminar en la ciudad?" },
                { en: "Adventure or relaxation for a weekend trip?", es: "¿Aventura o relajo para un viaje de fin de semana?" },
                { en: "Do you prefer sweet or savory?", es: "¿Prefieres lo dulce o lo salado?" },
                { en: "What’s the most recent hobby you’ve picked up?", es: "¿Cuál es el hobby más reciente que has empezado?" },
                { en: "What is your favorite Peruvian fruit?", es: "¿Cuál es tu fruta peruana favorita?" },
                { en: "Are you a morning person or a night owl?", es: "¿Eres una persona mañanera o noctámbula?" },
                { en: "What is the best concert you've ever been to?", es: "¿Cuál ha sido el mejor concierto al que has ido?" },
                { en: "What’s your favorite way to spend a Sunday?", es: "¿Cómo te gusta pasar los domingos?" },
                { en: "Do you have any pets?", es: "¿Tienes mascotas?" },
                { en: "What’s the last movie that made you laugh?", es: "¿Cuál fue la última película que te hizo reír?" },
                { en: "What is your favorite season in Lima?", es: "¿Cuál es tu estación favorita en Lima?" },
                { en: "What’s a hidden gem in Lima?", es: "¿Cuál es tu 'huarique' o joya oculta favorita en Lima?" },
                { en: "What is the most impressive thing you can cook?", es: "¿Qué es lo más pro que sabes cocinar?" },
                { en: "What is your plan for the next year?", es: "¿Cuál es tu plan para el próximo año?" },
                { en: "What is the most recent new thing you tried?", es: "¿Qué es lo último nuevo que has probado?" },
                { en: "What is your favorite restaurant in Lima?", es: "¿Cuál es tu restaurante favorito en Lima?" },
                { en: "Which is the best bakery in your neighborhood?", es: "¿Cuál es la mejor panadería de tu barrio?" },
                { en: "Are you a fan of spicy food (ají)?", es: "¿Te gusta la comida con harto ají?" },
                { en: "What was your first impression of Lima?", es: "¿Cuál fue tu primera impresión de Lima?" },
                { en: "Which market do you prefer for your weekly shopping?", es: "¿A qué mercado prefieres ir para tus compras?" }
            ],
            blue: [
                { en: "What is a lesson you learned the hard way?", es: "¿Qué lección aprendiste por las malas?" },
                { en: "What are you most grateful for today?", es: "¿De qué estás más agradecido hoy?" },
                { en: "Who has been the most influential person in your life?", es: "¿Quién ha sido la persona más influyente en tu vida?" },
                { en: "What is a goal you're currently working toward?", es: "¿En qué meta estás trabajando ahora?" },
                { en: "What does 'home' mean to you?", es: "¿Qué significa 'hogar' para ti?" },
                { en: "What is a fear you’ve overcome?", es: "¿Qué miedo has logrado superar?" },
                { en: "When do you feel most like yourself?", es: "¿Cuándo te sientes más tú mismo?" },
                { en: "What is a habit you’d like to change?", es: "¿Qué hábito te gustaría cambiar?" },
                { en: "How do you handle stress or burnout?", es: "¿Cómo manejas el estrés o el agotamiento?" },
                { en: "What is the most beautiful place you've ever seen?", es: "¿Cuál es el lugar más hermoso que has visto?" },
                { en: "What are you proud of but rarely talk about?", es: "¿De qué te sientes orgulloso pero rara vez hablas?" },
                { en: "What do you value most in a friendship?", es: "¿Qué es lo que más valoras en una amistad?" },
                { en: "What is your favorite memory from childhood?", es: "¿Cuál es tu recuerdo favorito de la infancia?" },
                { en: "How do you recharge your energy?", es: "¿Cómo recargas tus energías?" },
                { en: "What does success look like to you?", es: "¿Cómo se ve el éxito para ti?" },
                { en: "If you had to choose between losing your sight or your hearing, which would you keep?", es: "¿Qué preferirías conservar: la vista o el oído?" },
                { en: "What was your first ever job and what did you like about it?", es: "¿Cuál fue tu primer trabajo y qué te gustó de él?" },
                { en: "What part of your personality do you like the most?", es: "¿Qué parte de tu personalidad te gusta más?" },
                { en: "How has living abroad changed your perspective?", es: "¿Cómo ha cambiado tu perspectiva el vivir fuera?" },
                { en: "What are you most proud of in your life?", es: "¿De qué te sientes más orgulloso en tu vida?" },
                { en: "What is a challenge you've overcome recently?", es: "¿Qué desafío has superado hace poco?" }
            ],
            red: [
                { en: "If you could know the absolute truth to one question, what would you ask?", es: "Si pudieras saber la verdad absoluta sobre algo, ¿qué preguntarías?" },
                { en: "What do you want to be remembered for?", es: "¿Por qué te gustaría ser recordado?" },
                { en: "Does everything happen for a reason, or is it just chaos?", es: "¿Todo pasa por algo o es simplemente caos?" },
                { en: "What is the meaning of a 'good life'?", es: "¿Qué significa para ti tener una 'buena vida'?" },
                { en: "If you could change one thing about the world, what would it be?", es: "Si pudieras cambiar algo del mundo, ¿qué sería?" },
                { en: "What is the hardest truth you’ve had to accept?", es: "¿Cuál es la verdad más dura que has tenido que aceptar?" },
                { en: "What think happens after we die?", es: "¿Qué crees que pasa después de la muerte?" },
                { en: "Can people truly change?", es: "¿Crees que las personas pueden cambiar de verdad?" },
                { en: "Is world peace actually possible?", es: "¿Crees que la paz mundial es posible?" },
                { en: "What is the most profound experience you've ever had?", es: "¿Cuál es la experiencia más profunda que has tenido?" },
                { en: "We all keep secrets. If ALL of yours were made public, how would you feel?", es: "Todos guardamos secretos. Si TODOS los tuyos se hicieran públicos, ¿cómo te sentirías?" },
                { en: "If you knew a close family member committed a terrible crime, would you tell the Police?", es: "Si supieras que un familiar cercano cometió un crimen terrible, ¿llamarías a la policía?" },
                { en: "Is it better to be a small fish in a big pond or vice versa?", es: "¿Es mejor ser cabeza de ratón o cola de león?" },
                { en: "Do you believe in luck or hard work?", es: "¿Crees en la suerte o en el trabajo duro?" },
                { en: "Does technology bring us closer or further apart?", es: "¿La tecnología nos acerca o nos aleja?" },
                { en: "Is justice more important than mercy?", es: "¿Es la justicia más importante que la misericordia?" },
                { en: "What is the one thing that makes life worth living?", es: "¿Qué es lo único que hace que la vida valga la pena?" }
            ],
            green: [
                { en: "If you won the lottery tomorrow, what is the first thing you'd buy?", es: "Si ganaras la lotería, ¿qué sería lo primero que comprarías?" },
                { en: "If you could have any superpower, what would it be?", es: "Si pudieras tener un superpoder, ¿cuál sería?" },
                { en: "If you could travel to any year, past or future, where would you go?", es: "¿A qué época viajarías?" },
                { en: "If you could talk to animals, which one first?", es: "Si pudieras hablar con animales, ¿con cuál empezarías?" },
                { en: "If you were stranded on a desert island, which 3 people would you bring?", es: "3 personas para llevarte a una isla desierta:" },
                { en: "If you found a magic lamp, what would your three wishes be?", es: "3 deseos de la lámpara mágica:" },
                { en: "If you were an animal, which matches your personality?", es: "¿Qué animal encaja con tu forma de ser?" },
                { en: "Your home is collapsing in an earthquake: what one item do you rescue?", es: "Terremoto: ¿qué objeto rescatas de tu casa?" },
                { en: "If money didn't matter, what would you do with your life?", es: "Si la plata no importara, ¿qué harías con tu vida?" },
                { en: "1 minute with your 10-year-old self: what do you say?", es: "1 minuto con tu 'yo' de 10 años: ¿qué le dices?" },
                { en: "If you could open a museum, what would you put inside?", es: "Si pudieras abrir un museo, ¿qué pondrías dentro?" },
                { en: "If you could be famous for one thing, what would it be?", es: "Si pudieras ser famoso por una sola cosa, ¿cuál sería?" },
                { en: "If you could create a new holiday, what would it celebrate?", es: "Si pudieras crear un feriado nuevo, ¿qué celebraría?" }
            ]
        };

        function pick(color) {
            const list = questions[color];
            const randomIndex = Math.floor(Math.random() * list.length);
            const selection = list[randomIndex];
            
            document.getElementById('en').innerText = selection.en;
            document.getElementById('es').innerText = selection.es;
            
            // Updates border color to match category
            document.getElementById('display').style.borderColor = getComputedStyle(document.querySelector('.' + color)).backgroundColor;
        }

        function generateNumber() {
            const num = Math.floor(Math.random() * 100) + 1;
            document.getElementById('number-out').innerText = num;
        }
    </script>
</body>
</html>
