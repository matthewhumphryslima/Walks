<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lima Walk & Talk</title>
    <style>
        body { font-family: 'Helvetica', sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: auto; }
        button { border: none; padding: 50px 10px; font-size: 1.1rem; border-radius: 12px; cursor: pointer; font-weight: bold; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .yellow { background: #f1c40f; color: #333; }
        .blue { background: #3498db; color: white; }
        .red { background: #e74c3c; color: white; }
        .green { background: #2ecc71; color: white; }
        #display { margin-top: 30px; padding: 25px; background: #2c3e50; border-radius: 15px; min-height: 120px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid #444; }
        .lang-en { font-style: italic; color: #bdc3c7; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <h1>Walking Group Randomizer</h1>
    <div class="grid">
        <button class="yellow" onclick="generate('yellow')">YELLOW<br>(Icebreakers)</button>
        <button class="blue" onclick="generate('blue')">BLUE<br>(Reflective)</button>
        <button class="red" onclick="generate('red')">RED<br>(Existential)</button>
        <button class="green" onclick="generate('green')">GREEN<br>(Hypothetical)</button>
    </div>
    <div id="display"><p>Tap a color to start!</p></div>

    <script>
        const questions = {
            yellow: [
                { es: "¿Cuál es tu 'huarique' favorito en Lima?", en: "What's your favorite hidden gem 'huarique' in Lima?" },
                { es: "¿Qué hábito raro tienes?", en: "What's a weird habit you have?" },
                { es: "¿Cuál es el mejor cumplido que has recibido?", en: "What's the best compliment you've ever received?" }
            ],
            blue: [
                { es: "¿Qué significa 'hogar' para ti ahora?", en: "What does 'home' mean to you now?" },
                { es: "¿Qué creencia has cambiado recientemente?", en: "What is a belief you've recently changed?" },
                { es: "¿Qué sonido te trae paz?", en: "What sound brings you peace?" }
            ],
            red: [
                { es: "¿De qué te sientes más orgulloso pero rara vez hablas?", en: "What are you most proud of but rarely talk about?" },
                { es: "Si hoy fuera tu último día, ¿a quién llamarías?", en: "If today was your last day, who would you call?" },
                { es: "¿Qué legado quieres dejar?", en: "What legacy do you want to leave behind?" }
            ],
            green: [
                { es: "Si pudieras teletransportarte una vez, ¿a dónde irías?", en: "If you could teleport once, where would you go?" },
                { es: "¿En qué trabajo serías el peor del mundo?", en: "What job would you be the absolute worst at?" },
                { es: "Si ganaras la tinka mañana, ¿qué sería lo primero que harías?", en: "If you won the lottery tomorrow, what's the first thing you'd do?" }
            ]
        };

        function generate(color) {
            const list = questions[color];
            const q = list[Math.floor(Math.random() * list.length)];
            document.getElementById('display').innerHTML = `
                <strong style="color:white; font-size:1.4rem;">${q.es}</strong>
                <span class="lang-en">${q.en}</span>
            `;
        }
    </script>
</body>
</html>
